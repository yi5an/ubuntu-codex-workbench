<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubuntu Codex Workbench</title>
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Projects</p>
          <div class="sidebar-header-actions">
            <button id="settings-btn" class="icon-button" title="设置">设置</button>
            <button id="add-project-btn" class="primary-button compact-button">添加项目</button>
          </div>
        </div>

        <label class="search-field">
          <span>搜索项目</span>
          <input id="project-search-input" type="search" placeholder="按项目名称过滤" />
        </label>

        <div id="project-list" class="project-list"></div>
      </aside>
      <div id="sidebar-resizer" class="sidebar-resizer"></div>

      <main class="main-panel">
        <div id="environment-banner" class="environment-banner hidden"></div>

        <section class="workspace-body">
          <section id="terminal-view" class="card terminal-card">
            <div id="terminal-host" class="terminal-host"></div>
          </section>
        </section>
      </main>
    </div>
    <div id="settings-modal" class="modal-backdrop hidden">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h3 id="settings-title">应用设置</h3>
          </div>
          <button id="settings-close-btn" class="icon-button" title="关闭">关闭</button>
        </div>
        <div class="modal-body">
          <section class="settings-panel">
            <div class="settings-panel-row">
              <div>
                <div class="settings-label">当前 Codex</div>
                <div id="settings-codex-summary" class="settings-value">正在检查...</div>
              </div>
            </div>
            <label id="settings-codex-select-wrap" class="settings-panel-row hidden">
              <span class="settings-label">Codex 路径</span>
              <select id="settings-codex-select" class="settings-select"></select>
            </label>
            <div id="settings-codex-help" class="settings-help"></div>
          </section>
        </div>
        <div class="modal-footer">
          <button id="settings-cancel-btn" class="secondary-button">取消</button>
          <button id="settings-save-btn" class="primary-button">保存并重启</button>
        </div>
      </section>
    </div>
    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
  </html>
